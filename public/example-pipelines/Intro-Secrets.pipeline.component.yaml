name: 'Intro: Secrets'
description: |
  Demonstrates Tangle's secret-injection feature: a pipeline input is bound to a
  named secret at submit time via `dynamicData.secret`, and the value lands in
  the running container as a file. The demo reads the secret, makes an
  authenticated HTTP GET to https://httpbin.org/bearer using the secret as a
  Bearer token, and prints httpbin's response. Uses only the public
  python:3.12-slim image and the Python standard library — no Shopify-internal
  components or data.

  Before submitting, create the secret on the cluster:

      tangle-deploy secrets create DEMO_BEARER_TOKEN --value 'any-string-works'

  Then submit with a config that maps the pipeline input to the secret name:

      tangle-deploy pipeline-run submit secrets_demo_pipeline.yaml \\
        -f secrets_demo_pipeline.config.yaml --hydrate --no-wait

  The config (see secrets_demo_pipeline.config.yaml) just contains:

      pipeline_path: secrets_demo_pipeline.yaml
      args:
        DEMO_TOKEN:
          dynamicData:
            secret:
              name: DEMO_BEARER_TOKEN

  Clean up after: `tangle-deploy secrets delete DEMO_BEARER_TOKEN`.
metadata:
  annotations:
    flex-nodes: '[{"id":"note-secrets","properties":{"title":"Secrets Feature","content":"Pipeline inputs can be bound to named secrets at submit time. The secret value is materialized inside the container as a file at the path passed via inputPath — never as an environment variable, never on the command line. This keeps the value out of pod specs, run YAML, and Tangle UI metadata.","color":"#E3F2FD"},"metadata":{"createdAt":"2026-05-22T00:00:00.000Z","createdBy":"river-tangent"},"size":{"width":340,"height":180},"position":{"x":40,"y":-220},"zIndex":0},{"id":"note-secrets-flow","properties":{"title":"Two-step setup","content":"1) Create the secret in your Tangle instance via the Settings -> Secrets menu.\n2) Submit the pipeline with a config that maps the pipeline input to the secret name via dynamicData.secret. The value never appears in the pipeline YAML itself — only the name does, and only at submit time.","color":"#FFF3E0"},"metadata":{"createdAt":"2026-05-22T00:00:00.000Z","createdBy":"river-tangent"},"size":{"width":340,"height":200},"position":{"x":420,"y":-220},"zIndex":0,"readOnly":false,"highlighted":false}]'
    editor.flow-direction: left-to-right
    cloned_from_run_id: 019e50eb1c5468741cad
inputs:
  - name: DEMO_TOKEN
    description: |
      Bearer token, supplied at submit time via dynamicData.secret. Read by the
      `Authenticated Request` task as a file (inputPath) — never logged.
    annotations:
      editor.position: '{"x": -150, "y": 100}'
outputs:
  - name: HTTP Response
    annotations:
      editor.position: '{"x":980,"y":100}'
implementation:
  graph:
    tasks:
      Show Response:
        componentRef:
          name: Show Response
          spec:
            name: Show Response
            description: Echoes the masked HTTP response to stdout and to the pipeline output.
            inputs:
              - name: response
                type: String
            outputs:
              - name: echoed
                type: String
            implementation:
              container:
                image: python:3.12-slim
                command:
                  - sh
                  - '-ec'
                  - |
                    # $0 is the first positional arg (inputPath), $1 the second (outputPath)
                    cat "$0"
                    mkdir -p "$(dirname "$1")"
                    cp "$0" "$1"
                  - inputPath: response
                  - outputPath: echoed
        arguments:
          response:
            taskOutput:
              outputName: response
              taskId: Authenticated Request
        annotations:
          editor.position: '{"x": 600, "y": 100}'
      Authenticated Request:
        componentRef:
          name: Authenticated Request
          spec:
            name: Authenticated Request
            description: |
              Reads a bearer token from the secret file, sends a GET to
              https://httpbin.org/bearer with `Authorization: Bearer <token>`, and
              writes the JSON response body to its output. Prints the token length
              (never the value) and the HTTP status to stdout.
            inputs:
              - name: token
                description: Bearer token, injected from a Tangle secret.
            outputs:
              - name: response
                type: String
                description: httpbin's JSON response body.
            implementation:
              container:
                image: python:3.12-slim
                command:
                  - python3
                  - '-u'
                  - '-c'
                  - |
                    import json, os, sys, urllib.request

                    token_path, response_path = sys.argv[1], sys.argv[2]
                    with open(token_path) as f:
                        token = f.read().strip()

                    print(f"loaded token: length={len(token)} (value not logged)")

                    req = urllib.request.Request(
                        "https://httpbin.org/bearer",
                        headers={"Authorization": f"Bearer {token}"},
                    )
                    with urllib.request.urlopen(req, timeout=30) as resp:
                        status = resp.status
                        body = resp.read().decode("utf-8")

                    print(f"http status: {status}")
                    parsed = json.loads(body)
                    # httpbin echoes the token back — mask it before writing to the output.
                    if "token" in parsed:
                        parsed["token"] = f"<{len(parsed['token'])} chars>"
                    masked = json.dumps(parsed, indent=2)
                    print(masked)

                    os.makedirs(os.path.dirname(response_path), exist_ok=True)
                    with open(response_path, "w") as f:
                        f.write(masked + "\n")
                args:
                  - inputPath: token
                  - outputPath: response
        arguments:
          token:
            graphInput:
              inputName: DEMO_TOKEN
        annotations:
          editor.position: '{"x": 200, "y": 100}'
          cloud-pipelines.net/launchers/generic/resources.cpu: '1'
          cloud-pipelines.net/launchers/generic/resources.memory: 512Mi
    outputValues:
      HTTP Response:
        taskOutput:
          outputName: echoed
          taskId: Show Response
