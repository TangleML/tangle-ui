    author: tangle-demo
    flex-nodes: '[{"id":"mn-overview","properties":{"title":"Multi-Node Training","content":"This pipeline shows off Tangle''s multi-node feature. The ''Distributed Train'' task runs on 2 pods at the same time. Each pod gets its own node_rank (0 or 1) plus the DNS addresses of all its peers, injected through dynamicData:\n\n• system/multi_node/node_index → per-pod rank\n• system/multi_node/number_of_nodes → total pods\n• system/multi_node/all_node_addresses → comma-separated DNS\n\nThe tangleml.com/.../number_of_nodes annotation on the task tells Tangle how many pods to spawn. Every pod runs the same container image but with different injected values, which is what lets PyTorch DistributedDataParallel (DDP) sync gradients across nodes.","color":"#E3F2FD","borderColor":"#1565C0"},"metadata":{"createdAt":"2026-05-30T00:15:00.000Z","createdBy":"tangle-demo"},"size":{"width":320,"height":380},"position":{"x":390,"y":-430},"zIndex":0},{"id":"mn-data-flow","properties":{"title":"Data Partitioning","content":"Shards get handed out round-robin:\n\n• Node 0 takes shards 0, 2, 4, 6\n• Node 1 takes shards 1, 3, 5, 7\n\nAfter each training step, gradients are averaged across all nodes with torch.distributed.all_reduce(). Only Node 0 (the master) writes out the final checkpoint and metrics.","color":"#FFF9C4","borderColor":"#F9A825"},"metadata":{"createdAt":"2026-05-30T00:15:00.000Z","createdBy":"tangle-demo"},"size":{"width":280,"height":220},"position":{"x":770,"y":-270},"zIndex":0},{"id":"flex_mpvikik96fvb_9","properties":{"title":"How to Set Up Multi-Node in Tangle UI","content":"How to turn on multi-node for any task:\n\n1. Select the task and open its Settings panel.\n\n2. Under Annotations, add:\n   tangleml.com/launchers/kubernetes/\n   multi_node/number_of_nodes = \"2\"\n   (or however many pods you want)\n\n3. Add the shared memory annotation:\n   cloud-pipelines.net/launchers/\n   generic/resources.shared_memory\n   = \"2Gi\" (NCCL/gloo IPC needs this)\n\n4. Add 3 component inputs of type String/Integer\n   for: num_nodes, node_rank, all_node_addresses.\n\n5. Wire each input to Dynamic Data:\n   • num_nodes → system/multi_node/\n     number_of_nodes\n   • node_rank → system/multi_node/\n     node_index\n   • all_node_addresses → system/\n     multi_node/all_node_addresses\n\n6. In your container code, feed these values\n   into torch.distributed.init_process_group(),\n   using MASTER_ADDR from the first address\n   and RANK from node_rank.\n\nThat''s it. Tangle spawns N identical pods\nand injects the right values into each one.","color":"#E8F5E9","borderColor":"#BCBCBC"},"metadata":{"createdAt":"2026-06-01T18:00:10.233Z","createdBy":"tangle-demo"},"size":{"width":290,"height":530},"position":{"x":1150,"y":70},"zIndex":0}]'
