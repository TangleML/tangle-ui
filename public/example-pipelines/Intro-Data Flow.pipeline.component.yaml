                          rows = list(reader)

                      random.shuffle(rows)
                      split_idx = int(len(rows) * train_fraction)
                      train_rows = rows[:split_idx]
                      test_rows = rows[split_idx:]

                      for path, subset in [(train_data, train_rows), (test_data, test_rows)]:
