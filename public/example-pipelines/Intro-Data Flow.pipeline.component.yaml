      Evaluate:
        componentRef:
          name: Evaluate
          digest: c26e9e058d298c1c57dd96e15ea4261b99439a53fa9b323db4e9ef783933954c
          spec:
            name: Evaluate
            description: |-
              Compute regression metrics from a predictions CSV.

              Expects columns: actual, predicted. Outputs a JSON file with
              MAE, MSE, RMSE, R-squared, and row count.
            metadata:
              annotations:
                cloud_pipelines.net: 'true'
                component_yaml_path: evaluate.component.yaml
                python_original_code: |
                  from cloud_pipelines import components
                  import csv
                  import json
                  import math


                  def evaluate(
                      predictions: components.InputPath("CSV"),
                      metrics: components.OutputPath("JSON"),
                  ):
                      """Compute regression metrics from a predictions CSV.

                      Expects columns: actual, predicted. Outputs a JSON file with
                      MAE, MSE, RMSE, R-squared, and row count.

                      Args:
                          predictions: Input CSV with actual and predicted columns.
                          metrics: Output JSON with computed regression metrics.
                      """
                      with open(predictions, "r") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)

                      actuals = [float(r["actual"]) for r in rows]
                      preds = [float(r["predicted"]) for r in rows]
                      n = len(actuals)

                      errors = [a - p for a, p in zip(actuals, preds)]
                      abs_errors = [abs(e) for e in errors]
                      sq_errors = [e ** 2 for e in errors]

                      mae = sum(abs_errors) / n
                      mse = sum(sq_errors) / n
                      rmse = math.sqrt(mse)

                      mean_actual = sum(actuals) / n
                      ss_tot = sum((a - mean_actual) ** 2 for a in actuals)
                      ss_res = sum(sq_errors)
                      r_squared = 1 - (ss_res / ss_tot) if ss_tot > 0 else 0.0

                      result = {
                          "num_samples": n,
                          "mae": round(mae, 6),
                          "mse": round(mse, 6),
                          "rmse": round(rmse, 6),
                          "r_squared": round(r_squared, 6),
                          "max_error": round(max(abs_errors), 6),
                      }

                      with open(metrics, "w") as f:
                          json.dump(result, f, indent=2)

                      print(f"Evaluated {n} predictions:")
                      for k, v in result.items():
                          print(f"  {k}: {v}")
                python_original_code_path: evaluate.py
                components new regenerate python-function-component: 'true'
            inputs:
              - name: predictions
                type: CSV
                description: Input CSV with actual and predicted columns.
            outputs:
              - name: metrics
                type: JSON
                description: Output JSON with computed regression metrics.
            implementation:
              container:
                image: python:3.12
                command:
                  - sh
                  - '-ec'
                  - |
                    program_path=$(mktemp)
                    printf "%s" "$0" > "$program_path"
                    python3 -u "$program_path" "$@"
                  - |
                    def _make_parent_dirs_and_return_path(file_path: str):
                        import os
                        os.makedirs(os.path.dirname(file_path), exist_ok=True)
                        return file_path

                    import csv
                    import json
                    import math

                    def evaluate(
                        predictions,
                        metrics,
                    ):
                        """Compute regression metrics from a predictions CSV.

                        Expects columns: actual, predicted. Outputs a JSON file with
                        MAE, MSE, RMSE, R-squared, and row count.

                        Args:
                            predictions: Input CSV with actual and predicted columns.
                            metrics: Output JSON with computed regression metrics.
                        """
                        with open(predictions, "r") as f:
                            reader = csv.DictReader(f)
                            rows = list(reader)

                        actuals = [float(r["actual"]) for r in rows]
                        preds = [float(r["predicted"]) for r in rows]
                        n = len(actuals)

                        errors = [a - p for a, p in zip(actuals, preds)]
                        abs_errors = [abs(e) for e in errors]
                        sq_errors = [e ** 2 for e in errors]

                        mae = sum(abs_errors) / n
                        mse = sum(sq_errors) / n
                        rmse = math.sqrt(mse)

                        mean_actual = sum(actuals) / n
                        ss_tot = sum((a - mean_actual) ** 2 for a in actuals)
                        ss_res = sum(sq_errors)
                        r_squared = 1 - (ss_res / ss_tot) if ss_tot > 0 else 0.0

                        result = {
                            "num_samples": n,
                            "mae": round(mae, 6),
                            "mse": round(mse, 6),
                            "rmse": round(rmse, 6),
                            "r_squared": round(r_squared, 6),
                            "max_error": round(max(abs_errors), 6),
                        }

                        with open(metrics, "w") as f:
                            json.dump(result, f, indent=2)

                        print(f"Evaluated {n} predictions:")
                        for k, v in result.items():
                            print(f"  {k}: {v}")

                    import argparse
                    _parser = argparse.ArgumentParser(prog='Evaluate', description='Compute regression metrics from a predictions CSV.\n\nExpects columns: actual, predicted. Outputs a JSON file with\nMAE, MSE, RMSE, R-squared, and row count.')
                    _parser.add_argument("--predictions", dest="predictions", type=str, required=True, default=argparse.SUPPRESS)
                    _parser.add_argument("--metrics", dest="metrics", type=_make_parent_dirs_and_return_path, required=True, default=argparse.SUPPRESS)
                    _parsed_args = vars(_parser.parse_args())

                    _outputs = evaluate(**_parsed_args)
                args:
                  - '--predictions'
                  - inputPath: predictions
                  - '--metrics'
                  - outputPath: metrics
