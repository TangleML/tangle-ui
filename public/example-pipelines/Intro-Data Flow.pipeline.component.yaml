          spec:
            name: Train regression
            description: |-
              Train a simple linear regression model using ordinary least squares.

              Fits weights and bias to minimise squared error. Uses only Python stdlib
              (no numpy/sklearn). The trained model is saved as a JSON file containing
              the weight vector, bias, feature names, and training metrics.
            metadata:
              annotations:
                cloud_pipelines.net: 'true'
                component_yaml_path: train_regression.component.yaml
                python_original_code: |
                  from cloud_pipelines import components
                  import csv
                  import json


                  def train_regression(
                      training_data: components.InputPath("CSV"),
                      model: components.OutputPath("JSON"),
                      target_column: str = "target",
                  ):
                      """Train a simple linear regression model using ordinary least squares.

                      Fits weights and bias to minimise squared error. Uses only Python stdlib
                      (no numpy/sklearn). The trained model is saved as a JSON file containing
                      the weight vector, bias, feature names, and training metrics.

                      Args:
                          training_data: Input CSV with feature columns and a target column.
                          model: Output JSON file with trained model parameters.
                          target_column: Name of the column to predict.
                      """
                      with open(training_data, "r") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)

                      feature_names = [k for k in rows[0].keys() if k != target_column]
                      n = len(rows)
                      p = len(feature_names)

                      X = [[float(row[f]) for f in feature_names] for row in rows]
                      y = [float(row[target_column]) for row in rows]

                      # Add bias column (column of 1s)
                      X_aug = [[1.0] + row for row in X]
                      cols = p + 1

                      # Normal equation: (X^T X)^-1 X^T y
                      # Compute X^T X
                      XtX = [[0.0] * cols for _ in range(cols)]
                      for i in range(cols):
                          for j in range(cols):
                              XtX[i][j] = sum(X_aug[k][i] * X_aug[k][j] for k in range(n))

                      # Compute X^T y
                      Xty = [sum(X_aug[k][i] * y[k] for k in range(n)) for i in range(cols)]

                      # Solve via Gaussian elimination
                      aug = [XtX[i][:] + [Xty[i]] for i in range(cols)]
                      for i in range(cols):
                          max_row = max(range(i, cols), key=lambda r: abs(aug[r][i]))
                          aug[i], aug[max_row] = aug[max_row], aug[i]
                          pivot = aug[i][i]
                          if abs(pivot) < 1e-12:
                              continue
                          for j in range(i, cols + 1):
                              aug[i][j] /= pivot
                          for r in range(cols):
                              if r != i:
                                  factor = aug[r][i]
                                  for j in range(i, cols + 1):
                                      aug[r][j] -= factor * aug[i][j]

                      params = [aug[i][cols] for i in range(cols)]
                      bias = params[0]
                      weights = params[1:]

                      # Training RMSE
                      predictions = [bias + sum(w * x for w, x in zip(weights, row)) for row in X]
                      mse = sum((p - a) ** 2 for p, a in zip(predictions, y)) / n
                      rmse = mse ** 0.5

                      model_data = {
                          "feature_names": feature_names,
                          "weights": [round(w, 6) for w in weights],
                          "bias": round(bias, 6),
                          "training_rmse": round(rmse, 6),
                          "training_rows": n,
                      }

                      with open(model, "w") as f:
                          json.dump(model_data, f, indent=2)

                      print(f"Trained on {n} rows, {p} features")
                      print(f"Weights: {dict(zip(feature_names, weights))}")
                      print(f"Bias: {bias:.4f}, Training RMSE: {rmse:.4f}")
                python_original_code_path: train_regression.py
                components new regenerate python-function-component: 'true'
